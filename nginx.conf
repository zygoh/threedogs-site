server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml text/markdown;
    gzip_min_length 256;

    # Agent-oriented content negotiation:
    # requests with `Accept: text/markdown` get the Markdown version of the homepage.
    location = / {
        add_header Vary "Accept";
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /index.md last;
        }
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.md {
        types { } 
        default_type "text/markdown; charset=utf-8";
        add_header Vary "Accept";
        add_header Cache-Control "no-cache";
        expires -1;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
